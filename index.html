      window.addEventListener('error', function (event) {
        window.__CARGOSOON_BOOT_ERRORS__.push({
          type: 'error',
          message: event.message || 'Unknown script error',
          source: event.filename || '',
          line: event.lineno || 0,

      window.addEventListener('unhandledrejection', function (event) {
        var reason = event.reason;

    <script>
      (function () {
        var hasNativeStorage = false;
        try {
          if (window.localStorage) {
            var probeKey = '__cargosoon_storage_probe__';
            window.localStorage.setItem(probeKey, '1');
            window.localStorage.removeItem(probeKey);
            hasNativeStorage = true;
          }
        } catch (error) {}

        if (hasNativeStorage) {
          return;
        }

        var store = {};
        var fallbackStorage = {
          getItem: function (key) {
            return Object.prototype.hasOwnProperty.call(store, key) ? store[key] : null;
          },
          setItem: function (key, value) {
            store[key] = String(value);
          },
          removeItem: function (key) {
            delete store[key];
          },
          clear: function () {
            store = {};
          },
          key: function (index) {
            return Object.keys(store)[index] || null;
          },
          get length() {
            return Object.keys(store).length;
          },
        };

        try {
          Object.defineProperty(window, 'localStorage', {
            configurable: true,
            get: function () {
              return fallbackStorage;
            },
          });
        } catch (error) {
          try {
            window.localStorage = fallbackStorage;
          } catch (assignError) {}
        }
      })();
    </script>
